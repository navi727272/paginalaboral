<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gracias por contactar al Estudio Jurídico Dr. Mario Iván Reyes, abogado laboral en Río Gallegos. Su consulta ha sido recibida.">
    <meta name="robots" content="noindex, nofollow">

    <title>Gracias por su consulta | Dr. Mario Iván Reyes - Abogado Laboral Río Gallegos</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #2d2b55;
            color: #fff;
            line-height: 1.7;
            font-size: 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gracias-container {
            text-align: center;
            padding: 60px 40px;
            background-color: rgba(90, 74, 90, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 600px;
            margin: 20px;
        }

        .gracias-container h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #4ecdc4;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .gracias-container p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        .btn-volver {
            display: inline-block;
            background-color: rgba(78, 205, 196, 0.8);
            color: #fff;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-volver:hover {
            background-color: rgba(78, 205, 196, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .icono-check {
            font-size: 4em;
            margin-bottom: 20px;
            color: #4ecdc4;
        }

        @media (max-width: 768px) {
            .gracias-container {
                padding: 40px 25px;
                margin: 15px;
            }
            .gracias-container h1 {
                font-size: 2em;
            }
            .gracias-container p {
                font-size: 1em;
            }
            .btn-volver {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="gracias-container">
        <div class="icono-check">✓</div>
        <h1>¡Gracias por contactarnos!</h1>
        <p>Su consulta ha sido enviada correctamente al Estudio Jurídico.<br>Nos pondremos en contacto a la brevedad.</p>
        <a href="index.html" class="btn-volver">Volver al inicio</a>
    </div>
</body>
</html>
